<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Food Menu Grid</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f5f5f5;
      }

      .menu {
        width: 80%;
        margin: 50px auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 25px;
      }

      .food-item {
        background-color: #fff;
        padding: 15px;
        border-radius: 12px;
        text-align: center;
      }

      .food-item img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        border-radius: 12px;
      }

      .food-item p {
        margin-top: 10px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="menu">
      <div class="food-item">
        <img
          src="https://images.unsplash.com/photo-1514517220017-8ce97a34a7b6"
          alt="Macaroons"
        />
        <p>Macaroons</p>
      </div>

      <div class="food-item">
        <img
          src="https://images.unsplash.com/photo-1550547660-d9450f859349"
          alt="Hamburger and Fries"
        />
        <p>Hamburger and Fries</p>
      </div>

      <div class="food-item">
        <img
          src="https://images.unsplash.com/photo-1506084868230-bb9d95c24759"
          alt="Basil Leaves"
        />
        <p>Basil Leaves and Avocado on Sliced Bread</p>
      </div>

      <div class="food-item">
        <img
          src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092"
          alt="Grilled Meat"
        />
        <p>Grilled Meat</p>
      </div>

      <div class="food-item">
        <img
          src="https://images.unsplash.com/photo-1504674900247-0877df9cc836"
          alt="Fish"
        />
        <p>Fish</p>
      </div>

      <div class="food-item">
        <img
          src="https://images.unsplash.com/photo-1604908554160-65c8e5c19b9e"
          alt="Steak"
        />
        <p>Steak</p>
      </div>
    </div>
  </body>
</html>
